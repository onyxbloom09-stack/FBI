<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBI | Sensity Federal System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanline"></div>

    <div id="auth-lock" class="auth-overlay">
        <div class="lock-card">
            <img src="assets/fbi_logo.png" alt="FBI" class="fbi-seal-auth">
            <h2>CENTRAL INTELLIGENCE</h2>
            <p>Accès restreint - District de Sensity</p>
            <button class="discord-btn" id="login-btn">AUTHENTIFICATION DISCORD</button>
        </div>
    </div>

    <div class="app-container hidden" id="main-app">
        <aside class="sidebar">
            <div class="brand">
                <img src="assets/fbi_logo.png" alt="Logo">
                <div class="brand-text">
                    <h1>FEDERAL BUREAU</h1>
                    <span>SENSITY DISTRICT</span>
                </div>
            </div>

            <div class="agent-profile">
                <img id="user-avatar" src="" alt="Avatar">
                <div class="agent-info">
                    <span id="user-tag">CHARGEMENT...</span>
                    <button id="logout-btn" class="logout-link">DÉCONNEXION</button>
                </div>
            </div>

            <nav class="sidebar-nav">
                <p class="nav-title">BASE DE DONNÉES</p>
                <button class="nav-link active" data-tab="tab-search">🔍 RECHERCHE</button>
                <button class="nav-link" data-tab="tab-create">📂 NOUVEAU DOSSIER</button>
                
                <p class="nav-title">OPÉRATIONS</p>
                <button class="nav-link" data-tab="tab-units">👤 UNITÉS ACTIVES</button>
                
                <div id="admin-section" style="display:none;">
                    <p class="nav-title">COMMANDEMENT</p>
                    <button class="nav-link admin-btn" data-tab="tab-admin">⚙️ PANEL ADMIN</button>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div id="clock">00:00:00</div>
                <div class="status">ENCRYPTÉ : AES-256</div>
            </div>
        </aside>

        <main class="content-area">
            <section id="tab-search" class="tab-pane active">
                <div class="page-header"><h2>CONSULTATION DES ARCHIVES</h2></div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Nom du citoyen...">
                    <button class="btn-primary" id="search-exec">INTERROGER</button>
                </div>
                <div id="search-result"></div>
            </section>

            <section id="tab-create" class="tab-pane">
                <div class="page-header"><h2>ENREGISTREMENT JUDICIAIRE</h2></div>
                <div class="glass-card">
                    <div class="form-row">
                        <input type="text" id="target-name" placeholder="Nom Complet">
                        <select id="target-status">
                            <option value="LIBRE">🟢 LIBRE</option>
                            <option value="SURVEILLANCE">🟡 SURVEILLANCE</option>
                            <option value="RECHERCHÉ">🔴 RECHERCHÉ</option>
                        </select>
                    </div>
                    <textarea id="target-details" placeholder="Détails du dossier..." rows="8"></textarea>
                    <button class="btn-primary full" id="save-exec">ARCHIVER DANS LE CLOUD</button>
                </div>
            </section>

            <section id="tab-units" class="tab-pane">
                <div class="page-header"><h2>UNITÉS EN SERVICE</h2></div>
                <div id="units-list" class="grid-list"></div>
            </section>

            <section id="tab-admin" class="tab-pane">
                <div class="page-header"><h2>PANEL DE COMMANDEMENT</h2></div>
                <div id="admin-reports" class="scroll-list"></div>
            </section>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
