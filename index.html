<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBI | Sensity Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanline"></div>
    <div class="noise"></div>

    <div id="auth-lock" class="auth-overlay">
        <div class="lock-card">
            <img src="assets/fbi_logo.png" alt="FBI" class="fbi-seal-auth">
            <h2>CENTRAL INTELLIGENCE</h2>
            <p>DISTRICT DE SENSITY</p>
            <button class="discord-btn-auth" onclick="redirectToDiscord()">CONNEXION DISCORD</button>
        </div>
    </div>

    <div class="app-wrapper blur" id="main-app">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="fbi-header">
                    <img src="assets/fbi_logo.png" alt="Logo" class="main-logo">
                    <div class="header-titles">
                        <h1>FEDERAL BUREAU</h1>
                        <span>SENSITY UNIT</span>
                    </div>
                </div>

                <div class="user-profile">
                    <img id="user-avatar" src="" alt="">
                    <div class="user-info">
                        <p id="user-tag">AGENT</p>
                        <button onclick="logout()" class="logout-link">DÉCONNEXION</button>
                    </div>
                </div>

                <nav class="nav-menu">
                    <span class="nav-label">ARCHIVES</span>
                    <button class="nav-item active" data-tab="search-tab">🔍 RECHERCHE</button>
                    <button class="nav-item" data-tab="create-tab">📂 NOUVEAU DOSSIER</button>
                    
                    <span class="nav-label">OPÉRATIONS</span>
                    <button class="nav-item" data-tab="units-tab">👤 UNITÉS ACTIVES</button>
                    
                    <div id="admin-nav-section" style="display:none;">
                        <span class="nav-label">COMMANDEMENT</span>
                        <button class="nav-item admin-link" data-tab="admin-tab">⚙️ PANEL ADMIN</button>
                    </div>
                </nav>
            </div>
            <div class="sidebar-bottom">
                <div id="clock">00:00:00</div>
            </div>
        </aside>

        <main class="main-content">
            <section id="search-tab" class="tab-pane active">
                <h2 class="section-title">CONSULTATION DES ARCHIVES</h2>
                <div class="search-container">
                    <div class="search-bar">
                        <input type="text" id="search-input" placeholder="Saisir un nom...">
                        <button class="btn-primary" onclick="searchCitizen()">INTERROGER</button>
                    </div>
                    <div id="search-result"></div>
                </div>
            </section>

            <section id="create-tab" class="tab-pane">
                <h2 class="section-title">ENREGISTREMENT JUDICIAIRE</h2>
                <div class="glass-card">
                    <div class="form-row">
                        <input type="text" id="report-title" placeholder="Nom du citoyen / Sujet">
                        <select id="report-status">
                            <option value="LIBRE">🟢 LIBRE</option>
                            <option value="SURVEILLANCE">🟡 SURVEILLANCE</option>
                            <option value="RECHERCHÉ">🔴 RECHERCHÉ</option>
                        </select>
                    </div>
                    <textarea id="report-content" placeholder="Détails du dossier..." rows="10"></textarea>
                    <button class="btn-primary" style="width:100%" onclick="submitFullReport()">TRANSMETTRE & ARCHIVER</button>
                </div>
            </section>

            <section id="units-tab" class="tab-pane">
                <h2 class="section-title">UNITÉS ACTIVES SUR LE TERRAIN</h2>
                <div id="public-agents-list" class="grid-list"></div>
            </section>

            <section id="admin-tab" class="tab-pane">
                <h2 class="section-title">PANEL DE COMMANDEMENT</h2>
                <div class="admin-grid">
                    <div class="glass-card">
                        <h3>GESTION DES EFFECTIFS</h3>
                        <div class="form-row">
                            <input type="text" id="adm-name" placeholder="Nom Agent">
                            <input type="text" id="adm-badge" placeholder="Matricule">
                            <button class="btn-primary" onclick="addAgent()">AFFECTER</button>
                        </div>
                        <div id="admin-agents-list" class="scroll-list"></div>
                    </div>
                    <div class="glass-card">
                        <h3>FLUX DES RAPPORTS REÇUS</h3>
                        <div id="admin-reports-list" class="scroll-list"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="report-modal" class="modal-overlay hidden">
        <div class="document-paper">
            <h2 id="modal-title"></h2>
            <p id="modal-meta" style="color:#666; font-size:0.8rem; margin-bottom:20px;"></p>
            <div id="modal-content" style="color:#222; white-space:pre-wrap; font-family:serif;"></div>
            <button onclick="closeReport()" class="btn-primary" style="margin-top:30px; width:100%;">FERMER</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
